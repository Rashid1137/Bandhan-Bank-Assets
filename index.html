<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandhan IT Assets Management Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light-bg: #f4f7f6;
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: var(--light-bg);
            color: #333;
        }
        
        .container {
            max-width: 1500px;
            margin: auto;
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header-center {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
        }

        .header-center h2 { color: var(--secondary); margin: 0; font-size: 28px; }
        .header-center h4 { color: var(--primary); margin: 5px 0; font-weight: 500; }

        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            background: #dcdde1;
            color: var(--secondary);
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active { background: var(--primary); color: white; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .control-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e1e8ed;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .excel-input-group { display: flex; align-items: center; gap: 10px; background: white; padding: 8px 15px; border-radius: 8px; border: 1px solid #ddd; }

        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .btn-sort { background-color: var(--warning); color: white; }
        .btn-pdf { background-color: var(--success); color: white; }
        .btn-del-all { background-color: var(--danger); color: white; }
        .btn-add { background-color: var(--primary); color: white; width: 100%; margin-top: 10px; padding: 12px; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        .add-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .add-form input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.3s;
        }

        .add-form input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(52, 152, 219, 0.2); }

        .table-container { overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #eee; }

        table { width: 100%; border-collapse: collapse; background: white; min-width: 1000px; }
        th, td { border: 1px solid #f0f0f0; padding: 12px 10px; text-align: left; font-size: 13.5px; }
        th { background-color: var(--secondary); color: white; position: sticky; top: 0; }
        
        tr:hover { background-color: #f9fbfc; }
        
        .expired { background-color: #ffeaea !important; color: #d63031; }
        .expiring-soon { background-color: #fffbe6 !important; color: #e67e22; }
        .valid { background-color: #f1f9f1 !important; color: #27ae60; }

        .status-badge { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }

        .checkbox-col { text-align: center; width: 40px; }
        input[type="checkbox"] { cursor: pointer; transform: scale(1.2); }

        @media print {
            .control-panel, .tab-btn, .checkbox-col, th:last-child, td:last-child, .tabs-container { display: none !important; }
            body { padding: 0; background-color: white; }
            .container { box-shadow: none; border: none; max-width: 100%; }
            th { background-color: #333 !important; color: white !important; }
            td { font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-center">
        <h2><i class="fas fa-database"></i> Bandhan Bank IT Assets Tracker</h2>
        <h4>Rashid Husain - IT Management Portal</h4>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('printerTab', this)"><i class="fas fa-print"></i> Printer Tracker</button>
        <button class="tab-btn" onclick="switchTab('systemTab', this)"><i class="fas fa-desktop"></i> System & Monitor</button>
        <button class="tab-btn" onclick="switchTab('ccmTab', this)"><i class="fas fa-money-bill-wave"></i> CCM & UV Lamp</button>
    </div>

    <div id="tabPanels"></div>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyDY7QOUtDAFaQpQKP6fEHwxIuRPY0ffDNg",
        authDomain: "bandhan-bank-asset.firebaseapp.com",
        databaseURL: "https://bandhan-bank-asset-default-rtdb.firebaseio.com",
        projectId: "bandhan-bank-asset",
        storageBucket: "bandhan-bank-asset.firebasestorage.app",
        messagingSenderId: "731316926783",
        appId: "1:731316926783:web:c10b1da2fa8ff39c88fb8a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- ADMIN SECURITY PIN ---
    // Yahan aap apna Delete karne ka Password set kar sakte hain
    const ADMIN_PIN = "142212"; 

    // Tab Data Structure
    const tabs = [
        { id: 'printerTab', body: 'printerBody', icon: 'p', title: 'Printer' },
        { id: 'systemTab', body: 'systemBody', icon: 's', title: 'System' },
        { id: 'ccmTab', body: 'ccmBody', icon: 'c', title: 'CCM & UV Lamp' }
    ];

    // Build the Panels dynamically
    const panelsContainer = document.getElementById('tabPanels');
    tabs.forEach((tab, index) => {
        const activeClass = index === 0 ? 'active' : '';
        panelsContainer.innerHTML += `
            <div id="${tab.id}" class="tab-content ${activeClass}">
                <div class="control-panel">
                    <div class="action-bar">
                        <div class="excel-input-group">
                            <i class="fas fa-file-excel" style="color:#27ae60"></i>
                            <strong>Upload Excel:</strong> 
                            <input type="file" accept=".xlsx, .xls" onchange="handleExcel(this, '${tab.body}')" />
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-sort" onclick="sortRows('${tab.body}', 6)"><i class="fas fa-calendar-alt"></i> Sort Date</button>
                            <button class="btn btn-sort" style="background:#8e44ad" onclick="sortRows('${tab.body}', 1)"><i class="fas fa-sort-alpha-down"></i> Sort ID</button>
                            <button class="btn btn-pdf" onclick="window.print()"><i class="fas fa-file-pdf"></i> Report</button>
                            <button class="btn btn-del-all" onclick="deleteSelected('${tab.body}')"><i class="fas fa-trash-alt"></i> Delete Selected</button>
                        </div>
                    </div>
                    <div class="add-form">
                        <input type="text" id="${tab.icon}_bid" placeholder="Bank Id">
                        <input type="text" id="${tab.icon}_loc" placeholder="Bank Name">
                        <input type="text" id="${tab.icon}_make" placeholder="Make">
                        <input type="text" id="${tab.icon}_model" placeholder="Model">
                        <input type="text" id="${tab.icon}_fru" placeholder="FRU No.">
                        <input type="text" id="${tab.icon}_serial" placeholder="Serial No.">
                        <input type="date" id="${tab.icon}_date">
                    </div>
                    <button class="btn btn-add" onclick="manualAdd('${tab.icon}', '${tab.body}')"><i class="fas fa-plus"></i> Add New Entry</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th class="checkbox-col"><input type="checkbox" onclick="toggleSelectAll('${tab.body}', this)"></th>
                                <th>Bank Id</th>
                                <th>Bank Name</th>
                                <th>Make</th>
                                <th>Model</th>
                                <th>FRU No.</th>
                                <th>Serial No.</th>
                                <th>Warranty End</th>
                                <th>Days Left</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="${tab.body}"></tbody>
                    </table>
                </div>
            </div>
        `;
    });

    let isDataLoading = false;

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    function createRow(bodyId, bid, loc, fru, make, model, serial, date, skipSave = false) {
        const body = document.getElementById(bodyId);
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="checkbox-col"><input type="checkbox" class="row-check"></td>
            <td>${bid}</td><td>${loc}</td><td>${make}</td><td>${model}</td><td>${fru}</td><td>${serial}</td>
            <td><input type="date" value="${date}" onchange="refreshStatus(this)" style="border:none; background:transparent; font-family:inherit;"></td>
            <td class="days-left">-</td>
            <td><span class="status-badge status-text">-</span></td>
            <td><button class="btn" style="background:none; color:var(--danger); padding:0;" onclick="deleteSingle(this)"><i class="fas fa-trash"></i></button></td>
        `;
        body.appendChild(tr);
        refreshStatus(tr.querySelector('input[type="date"]'), skipSave);
    }

    function refreshStatus(input, skipSave = false) {
        const row = input.closest('tr');
        const daysCell = row.querySelector('.days-left');
        const statusSpan = row.querySelector('.status-text');
        row.classList.remove('expired', 'expiring-soon', 'valid');

        if(!input.value) return;
        const endDate = new Date(input.value);
        const today = new Date();
        today.setHours(0,0,0,0);
        const diff = Math.ceil((endDate - today) / (1000 * 3600 * 24));

        if (diff < 0) {
            row.classList.add('expired');
            statusSpan.innerText = "Expired";
            daysCell.innerText = Math.abs(diff) + " Overdue";
        } else if (diff <= 30) {
            row.classList.add('expiring-soon');
            statusSpan.innerText = "Expiring Soon";
            daysCell.innerText = diff + " Days";
        } else {
            row.classList.add('valid');
            statusSpan.innerText = "Active";
            daysCell.innerText = diff + " Days";
        }
        
        if(!skipSave && !isDataLoading) {
            saveAllDataToFirebase();
        }
    }

    function manualAdd(prefix, bodyId) {
        const inputs = [`${prefix}_bid`, `${prefix}_loc`, `${prefix}_fru`, `${prefix}_make`, `${prefix}_model`, `${prefix}_serial`, `${prefix}_date`];
        const vals = inputs.map(id => document.getElementById(id).value);
        if(!vals[0] || !vals[6]) return alert("Bank Id aur Warranty End Date dalna zaroori hai!");
        createRow(bodyId, vals[0], vals[1], vals[2], vals[3], vals[4], vals[5], vals[6]);
        inputs.forEach(id => document.getElementById(id).value = "");
        saveAllDataToFirebase();
    }

    function sortRows(bodyId, colIndex) {
        const tbody = document.getElementById(bodyId);
        const rows = Array.from(tbody.querySelectorAll('tr'));
        rows.sort((a, b) => {
            let valA = a.cells[colIndex].innerText || a.cells[colIndex].querySelector('input')?.value || "";
            let valB = b.cells[colIndex].innerText || b.cells[colIndex].querySelector('input')?.value || "";
            return valA.localeCompare(valB, undefined, {numeric: true});
        });
        tbody.innerHTML = '';
        rows.forEach(row => tbody.appendChild(row));
        saveAllDataToFirebase();
    }

    function handleExcel(input, bodyId) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            for(let i=1; i<json.length; i++) {
                const r = json[i];
                if(r[0]) {
                    let d = r[6];
                    if(!isNaN(d)) d = new Date((d - 25569) * 86400 * 1000).toISOString().split('T')[0];
                    createRow(bodyId, r[0]||'', r[1]||'', r[4]||'', r[2]||'', r[3]||'', r[5]||'', d||'', true);
                }
            }
            input.value = "";
            saveAllDataToFirebase();
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    function toggleSelectAll(bodyId, masterCheck) {
        const checks = document.querySelectorAll(`#${bodyId} .row-check`);
        checks.forEach(c => c.checked = masterCheck.checked);
    }

    // --- SECURE DELETE LOGIC ---
    function deleteSelected(bodyId) {
        const checks = document.querySelectorAll(`#${bodyId} .row-check:checked`);
        if(checks.length === 0) return alert("Pehle delete karne ke liye entries select karein!");
        
        let pass = prompt("Dhyan Dein: Delete karne ke liye Admin PIN dalein:");
        if(pass !== ADMIN_PIN) {
            return alert("Galat PIN! Sirf Admin data delete kar sakta hai.");
        }

        if(confirm(`Kya aap sach me ye ${checks.length} entries delete karna chahte hain?`)) {
            checks.forEach(c => c.closest('tr').remove());
            saveAllDataToFirebase();
        }
    }

    function deleteSingle(btn) {
        let pass = prompt("Dhyan Dein: Delete karne ke liye Admin PIN dalein:");
        if(pass !== ADMIN_PIN) {
            return alert("Galat PIN! Sirf Admin data delete kar sakta hai.");
        }

        if(confirm("Kya aap is entry ko delete karna chahte hain?")) { 
            btn.closest('tr').remove(); 
            saveAllDataToFirebase(); 
        }
    }

    // --- FIREBASE SYNC LOGIC ---
    function saveAllDataToFirebase() {
        if(isDataLoading) return; // Prevent saving while loading from DB
        
        const data = {};
        tabs.forEach(tab => {
            data[tab.body] = [];
            document.querySelectorAll(`#${tab.body} tr`).forEach(row => {
                const cols = row.querySelectorAll('td');
                data[tab.body].push({
                    bid: cols[1].innerText, loc: cols[2].innerText, make: cols[3].innerText, 
                    model: cols[4].innerText, fru: cols[5].innerText, serial: cols[6].innerText,
                    date: cols[7].querySelector('input').value
                });
            });
        });
        
        // Push to Firebase Realtime Database
        db.ref('BandhanITAssets').set(data);
    }

    function loadDataFromFirebase() {
        db.ref('BandhanITAssets').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                isDataLoading = true; // Block saves while rendering
                
                tabs.forEach(tab => {
                    const tbody = document.getElementById(tab.body);
                    tbody.innerHTML = ""; // Clear existing rows before adding new ones
                    
                    if(data[tab.body]) {
                        data[tab.body].forEach(d => {
                            createRow(tab.body, d.bid, d.loc, d.fru, d.make, d.model, d.serial, d.date, true);
                        });
                    }
                });
                
                isDataLoading = false; // Unblock saves
            }
        });
    }

    // Initialize data load on window start
    window.onload = loadDataFromFirebase;
</script>
</body>
</html>
