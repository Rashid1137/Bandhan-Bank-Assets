<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Assets Warranty Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #eef2f5;
            color: #333;
            font-size: 16px; 
        }
        
        .container {
            max-width: 1400px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 12px 25px;
            cursor: pointer;
            border: none;
            background: #bdc3c7;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #3498db;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .header-center {
            text-align: center;
            margin-bottom: 30px;
        }

        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .excel-section {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #e8f4fd;
            border-radius: 8px;
            border: 1px dashed #3498db;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-form input {
            flex: 1 1 130px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-add {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-pdf {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-sort {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }
        th, td { 
            border: 1px solid #e0e0e0; 
            padding: 10px; 
            text-align: left; 
            font-size: 14px;
        }
        th { 
            background-color: #2c3e50; 
            color: white;
        }
        
        .expired { background-color: #ffe6e6; color: #cc0000; }
        .expiring-soon { background-color: #fff8cc; color: #b38600; }
        .valid { background-color: #e6ffe6; color: #008000; }

        .status-badge {
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
        }

        @media print {
            .add-form, .excel-section, .tabs-container, .btn-delete, button {
                display: none !important;
            }
            body { padding: 0; }
            .container { box-shadow: none; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-center">
        <h2>📊 Bandhan Bank IT Assets Management (Cloud)</h2>
        <h4>Rashid Husain - 9720110030</h4>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('printerTab', this)">🖨️ Printer Tracker</button>
        <button class="tab-btn" onclick="switchTab('systemTab', this)">💻 System & Monitor</button>
    </div>

    <div id="printerTab" class="tab-content active">
        <div class="excel-section">
            <div><strong>📁 Printer Excel:</strong> <input type="file" onchange="handleExcel(this, 'printerBody')" /></div>
            <div>
                <button class="btn-sort" onclick="sortRows('printerBody')">📅 Sort by Date</button>
                <button class="btn-pdf" onclick="window.print()">📄 PDF Report</button>
            </div>
        </div>
        <div class="add-form">
            <input type="text" id="p_bid" placeholder="Bank Id">
            <input type="text" id="p_loc" placeholder="Bank Name">
            <input type="text" id="p_make" placeholder="Company">
            <input type="text" id="p_model" placeholder="Model">
            <input type="text" id="p_fru" placeholder="Bandhan FRU No.">
            <input type="text" id="p_serial" placeholder="Serial No.">
            <input type="date" id="p_date">
            <button class="btn-add" onclick="manualAdd('p', 'printerBody')">Submit</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Bank Id</th>
                    <th>Bank Name</th>
                    <th>Company</th>
                    <th>Model</th>
                    <th>FRU No.</th>
                    <th>Serial No.</th>
                    <th>Warranty End</th>
                    <th>Days Left</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="printerBody"></tbody>
        </table>
    </div>

    <div id="systemTab" class="tab-content">
        <div class="excel-section">
            <div><strong>📁 System Excel:</strong> <input type="file" onchange="handleExcel(this, 'systemBody')" /></div>
            <div>
                <button class="btn-sort" onclick="sortRows('systemBody')">📅 Sort by Date</button>
                <button class="btn-pdf" onclick="window.print()">📄 PDF Report</button>
            </div>
        </div>
        <div class="add-form">
            <input type="text" id="s_bid" placeholder="Bank Id">
            <input type="text" id="s_loc" placeholder="Bank Name">
            <input type="text" id="s_make" placeholder="Company">
            <input type="text" id="s_model" placeholder="Model">
            <input type="text" id="s_fru" placeholder="Bandhan FRU No.">
            <input type="text" id="s_serial" placeholder="Serial No.">
            <input type="date" id="s_date">
            <button class="btn-add" onclick="manualAdd('s', 'systemBody')">Submit</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Bank Id</th>
                    <th>Bank Name</th>
                    <th>Company</th>
                    <th>Model</th>
                    <th>FRU No.</th>
                    <th>Serial No.</th>
                    <th>Warranty End</th>
                    <th>Days Left</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="systemBody"></tbody>
        </table>
    </div>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyDY7QOUtDAFaQpQKP6fEHwxIuRPY0ffDNg",
        authDomain: "bandhan-bank-asset.firebaseapp.com",
        databaseURL: "https://bandhan-bank-asset-default-rtdb.firebaseio.com",
        projectId: "bandhan-bank-asset",
        storageBucket: "bandhan-bank-asset.firebasestorage.app",
        messagingSenderId: "731316926783",
        appId: "1:731316926783:web:c10b1da2fa8ff39c88fb8a"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    // Cloud Save Function
    function saveAllData() {
        const data = {
            printers: extractTable('printerBody'),
            systems: extractTable('systemBody')
        };
        db.ref('bank_assets/').set(data)
            .then(() => console.log("Data saved to Cloud!"))
            .catch((err) => console.error("Cloud Save Error:", err));
    }

    function extractTable(bodyId) {
        let tableData = [];
        document.querySelectorAll(`#${bodyId} tr`).forEach(row => {
            const cols = row.querySelectorAll('td');
            tableData.push({
                bid: cols[0].innerText, loc: cols[1].innerText, make: cols[2].innerText, 
                model: cols[3].innerText, fru: cols[4].innerText, serial: cols[5].innerText,
                date: cols[6].querySelector('input').value
            });
        });
        return tableData;
    }

    // Cloud Load Function
    function loadAllData() {
        db.ref('bank_assets/').once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('printerBody').innerHTML = '';
                document.getElementById('systemBody').innerHTML = '';
                if(data.printers) data.printers.forEach(d => createRow('printerBody', d.bid, d.loc, d.fru, d.make, d.model, d.serial, d.date));
                if(data.systems) data.systems.forEach(d => createRow('systemBody', d.bid, d.loc, d.fru, d.make, d.model, d.serial, d.date));
            }
        }).catch((err) => console.error("Cloud Load Error:", err));
    }

    function createRow(bodyId, bid, loc, fru, make, model, serial, date) {
        const body = document.getElementById(bodyId);
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${bid}</td><td>${loc}</td><td>${make}</td><td>${model}</td><td>${fru}</td><td>${serial}</td>
            <td><input type="date" value="${date}" onchange="refreshStatus(this)"></td>
            <td class="days-left">-</td>
            <td><span class="status-badge status-text">-</span></td>
            <td><button style="background:#e74c3c;color:white;border:none;cursor:pointer;padding:5px;" onclick="deleteEntry(this)">Del</button></td>
        `;
        body.appendChild(tr);
        refreshStatus(tr.querySelector('input'));
    }

    function refreshStatus(input) {
        const row = input.closest('tr');
        const daysCell = row.querySelector('.days-left');
        const statusSpan = row.querySelector('.status-text');
        row.classList.remove('expired', 'expiring-soon', 'valid');

        if (!input.value) return;

        const endDate = new Date(input.value);
        const today = new Date();
        today.setHours(0,0,0,0);
        const diff = Math.ceil((endDate - today) / (1000 * 3600 * 24));

        if (diff < 0) {
            row.classList.add('expired');
            statusSpan.innerText = "Expired";
            daysCell.innerText = Math.abs(diff) + " Overdue";
        } else if (diff <= 30) {
            row.classList.add('expiring-soon');
            statusSpan.innerText = "Soon";
            daysCell.innerText = diff + " Days";
        } else {
            row.classList.add('valid');
            statusSpan.innerText = "Active";
            daysCell.innerText = diff + " Days";
        }
        saveAllData();
    }

    function manualAdd(prefix, bodyId) {
        const bid = document.getElementById(prefix + '_bid').value;
        const loc = document.getElementById(prefix + '_loc').value;
        const fru = document.getElementById(prefix + '_fru').value;
        const make = document.getElementById(prefix + '_make').value;
        const model = document.getElementById(prefix + '_model').value;
        const serial = document.getElementById(prefix + '_serial').value;
        const date = document.getElementById(prefix + '_date').value;

        if(!bid || !date) return alert("Required fields missing!");
        createRow(bodyId, bid, loc, fru, make, model, serial, date);
        saveAllData();
        document.querySelectorAll(`.add-form input`).forEach(i => i.value = "");
    }

    function sortRows(bodyId) {
        const tbody = document.getElementById(bodyId);
        const rows = Array.from(tbody.querySelectorAll('tr'));
        rows.sort((a, b) => {
            const dateA = new Date(a.querySelector('input[type="date"]').value);
            const dateB = new Date(b.querySelector('input[type="date"]').value);
            return dateA - dateB;
        });
        tbody.innerHTML = '';
        rows.forEach(row => tbody.appendChild(row));
    }

    function handleExcel(input, bodyId) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            for(let i=1; i<json.length; i++) {
                const r = json[i];
                if(r[0]) {
                    let d = r[6];
                    if(!isNaN(d)) d = new Date((d - 25569) * 86400 * 1000).toISOString().split('T')[0];
                    createRow(bodyId, r[0], r[1], r[4], r[2], r[3], r[5], d);
                }
            }
            saveAllData();
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    function deleteEntry(btn) {
        if(confirm("Delete entry?")) { btn.closest('tr').remove(); saveAllData(); }
    }

    window.onload = loadAllData;
</script>
</body>
</html>
